known_blockers:
  - id: SELF_CHECK_KIT_MISSING
    severity: gate_0_blocker
    summary: Self-Check Kit (ai-managed-solutions-self-check/audit.py) not present in repo or any FOAI sibling
    path_checked: ./ai-managed-solutions-self-check/
    command_attempted: python ai-managed-solutions-self-check/audit.py ./operator.yaml
    next_fix: Owner provides kit location or kit zip; receipt at docs/ship/receipts/2026-04-29-self-check-blocker.md
  - id: NURD_CODEBASE_ZOMBIE
    severity: low
    summary: 67MB duplicate of the entire repo at nurd-codebase/ awaiting owner deletion approval
    next_fix: Owner approves "yes delete"
  - id: PHASE_1_LIVE_OWNER_BLOCKED
    severity: gate_5_blocker
    summary: nurdscode.com not yet live on myclaw-vps
    next_fix: Owner runs DEPLOY_TO_MYCLAW_VPS.md sections 2-10

next_required_action:
  primary: Locate Self-Check Kit (audit.py) so Gate 0 can complete
  secondary: Run DEPLOY_TO_MYCLAW_VPS.md to clear Gate 1+5 blockers (LIVE deploy)
  tertiary: Begin Phase 1.5 cleanup (no behavior change refactor) so Phase 2 V.I.B.E. extraction is not blocked by mega-router/mega-storage coupling
