<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .osprey {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }
  </style>
  
  <!-- Osprey Body -->
  <path class="osprey" d="M100 120 C100 120, 90 110, 95 100 C100 90, 110 90, 115 95 C120 100, 110 120, 100 120 Z" />
  
  <!-- Head -->
  <path class="osprey" d="M115 95 C115 95, 125 85, 130 90 C135 95, 130 100, 125 100 C120 100, 115 95, 115 95 Z" />
  
  <!-- Beak -->
  <path class="osprey" d="M130 90 C130 90, 140 85, 145 90 C145 92, 140 95, 130 90 Z" />
  
  <!-- Wings -->
  <path class="osprey" d="M100 105 C100 105, 70 90, 60 95 C50 100, 55 110, 70 105 C85 100, 100 105, 100 105 Z" />
  <path class="osprey" d="M110 105 C110 105, 140 90, 150 95 C160 100, 155 110, 140 105 C125 100, 110 105, 110 105 Z" />
  
  <!-- Tail -->
  <path class="osprey" d="M100 120 C100 120, 95 130, 100 140 C105 130, 100 120, 100 120 Z" />
  
  <!-- Feet -->
  <path class="osprey" d="M95 120 C95 120, 90 130, 85 135" />
  <path class="osprey" d="M105 120 C105 120, 110 130, 115 135" />
  
  <!-- Eye -->
  <circle class="osprey" cx="125" cy="92" r="2" />
  
  <!-- Feather details -->
  <path class="osprey" d="M70 100 C70 100, 75 95, 80 100" />
  <path class="osprey" d="M75 102 C75 102, 80 97, 85 102" />
  <path class="osprey" d="M80 104 C80 104, 85 99, 90 104" />
  
  <path class="osprey" d="M140 100 C140 100, 135 95, 130 100" />
  <path class="osprey" d="M135 102 C135 102, 130 97, 125 102" />
  <path class="osprey" d="M130 104 C130 104, 125 99, 120 104" />
</svg>